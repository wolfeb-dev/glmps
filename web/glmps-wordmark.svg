<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" width="760" height="220" role="img" aria-labelledby="glmps-wordmark-title">
  <title id="glmps-wordmark-title">GLMPS — Watch your agents. Catch the misses.</title>

  <defs>
    <radialGradient id="w-gold-radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffbd38" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#34d399" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#041c1c" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle ambient glows on the panel, echoing the dashboard backdrop -->
    <radialGradient id="w-amb-emerald" cx="12%" cy="20%" r="55%">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="w-amb-gold" cx="92%" cy="85%" r="55%">
      <stop offset="0%"   stop-color="#ffbd38" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffbd38" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Self-contained dark panel: keeps the lockup legible on both dark and light READMEs -->
  <rect x="0" y="0" width="760" height="220" rx="18" fill="#041c1c"/>
  <rect x="0" y="0" width="760" height="220" rx="18" fill="url(#w-amb-emerald)"/>
  <rect x="0" y="0" width="760" height="220" rx="18" fill="url(#w-amb-gold)"/>
  <rect x="0.75" y="0.75" width="758.5" height="218.5" rx="17.25"
        fill="none" stroke="#ffe6cb" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- ===== Mark (static), centered vertically; mark viewBox 0..200 scaled into a 150px box at x=30,y=35 ===== -->
  <g transform="translate(30 35) scale(0.75)">
    <!-- telemetry grid -->
    <g stroke="#ffe6cb" stroke-width="1" opacity="0.05">
      <line x1="100" y1="20" x2="100" y2="180"/>
      <line x1="20" y1="100" x2="180" y2="100"/>
      <circle cx="100" cy="100" r="70" fill="none" stroke-dasharray="3 6"/>
      <circle cx="100" cy="100" r="52" fill="none"/>
    </g>
    <!-- core glow -->
    <circle cx="100" cy="100" r="34" fill="url(#w-gold-radial)"/>
    <!-- static radar pointer + faint trail -->
    <g opacity="0.18">
      <path d="M 100 100 L 100 30 A 70 70 0 0 1 149 50 Z" fill="#34d399"/>
    </g>
    <line x1="100" y1="100" x2="100" y2="30" stroke="#34d399" stroke-width="1.5" opacity="0.45"/>
    <!-- geometric G -->
    <path d="M 145 125 A 52 52 0 1 1 145 75"
          fill="none" stroke="#ffe6cb" stroke-width="12" stroke-linecap="round" opacity="0.92"/>
    <path d="M 145 100 H 115"
          fill="none" stroke="#34d399" stroke-width="12" stroke-linecap="round"/>
    <!-- crosshair ticks -->
    <g stroke="#ffe6cb" stroke-width="1" opacity="0.3">
      <line x1="100" y1="18" x2="100" y2="25"/>
      <line x1="100" y1="175" x2="100" y2="182"/>
      <line x1="18" y1="100" x2="25" y2="100"/>
      <line x1="175" y1="100" x2="182" y2="100"/>
    </g>
  </g>

  <!-- ===== Wordmark ===== -->
  <!-- GLMPS: bold, wide-tracked sans, cream -->
  <text x="208" y="118"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="76" font-weight="800" letter-spacing="14"
        fill="#ffe6cb">GLMPS</text>

  <!-- divider tick between wordmark and tagline -->
  <rect x="210" y="138" width="34" height="3" rx="1.5" fill="#34d399"/>

  <!-- Tagline: mono, smaller, two-tone emerald + cream -->
  <text x="252" y="152"
        font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace"
        font-size="18" letter-spacing="1.5">
    <tspan fill="#34d399">Watch your agents.</tspan><tspan fill="#ffe6cb" fill-opacity="0.7"> Catch the misses.</tspan>
  </text>

  <!-- small mono status line, top-right, for terminal/telemetry flavor -->
  <text x="730" y="34" text-anchor="end"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="11" letter-spacing="2" fill="#34d399" fill-opacity="0.6">SYS_MONITOR // ACTIVE</text>
</svg>
