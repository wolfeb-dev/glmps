<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-labelledby="glmps-mark-title">
  <title id="glmps-mark-title">GLMPS — animated telemetry mark: a geometric G inside a radar lens with a rotating sweep</title>

  <defs>
    <!-- Core radial glow: gold center fading through emerald to transparent -->
    <radialGradient id="m-gold-radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffbd38" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#34d399" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#041c1c" stop-opacity="0"/>
    </radialGradient>

    <!-- Data-shimmer highlight that runs along the G stroke -->
    <linearGradient id="m-glow-highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffe6cb" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#34d399" stop-opacity="0.1"/>
      <stop offset="50%"  stop-color="#34d399" stop-opacity="0.8"/>
      <stop offset="60%"  stop-color="#ffe6cb" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffe6cb" stop-opacity="0"/>
    </linearGradient>

    <!-- Fade the radar sweep trail from bright leading edge to nothing -->
    <linearGradient id="m-sweep-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.5"/>
    </linearGradient>

    <style>
      .m-sweep { transform-origin: 100px 100px; animation: m-radar-rotate 4s linear infinite; }
      @keyframes m-radar-rotate { to { transform: rotate(360deg); } }

      .m-core { animation: m-glow-breath 3s ease-in-out infinite; transform-origin: 100px 100px; }
      @keyframes m-glow-breath {
        0%, 100% { opacity: 0.30; transform: scale(0.92); }
        50%      { opacity: 0.85; transform: scale(1.06); }
      }

      .m-shimmer {
        stroke-dasharray: 300;
        stroke-dashoffset: 300;
        animation: m-data-pulse 5s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
      }
      @keyframes m-data-pulse {
        0%, 10%  { stroke-dashoffset: 300;  opacity: 0.3; }
        50%      { stroke-dashoffset: 0;    opacity: 1; }
        80%,100% { stroke-dashoffset: -300; opacity: 0.3; }
      }

      .m-tick { animation: m-tick-pulse 4s ease-in-out infinite; }
      @keyframes m-tick-pulse { 0%,100% { opacity: 0.25; } 50% { opacity: 0.5; } }

      @media (prefers-reduced-motion: reduce) {
        .m-sweep, .m-core, .m-shimmer, .m-tick { animation: none; }
        .m-shimmer { stroke-dashoffset: 0; opacity: 1; }
        .m-core { opacity: 0.6; }
      }
    </style>
  </defs>

  <!-- 1. Ambient telemetry grid -->
  <g stroke="#ffe6cb" stroke-width="1" opacity="0.05">
    <line x1="100" y1="20" x2="100" y2="180"/>
    <line x1="20" y1="100" x2="180" y2="100"/>
    <circle cx="100" cy="100" r="70" fill="none" stroke-dasharray="3 6"/>
    <circle cx="100" cy="100" r="52" fill="none"/>
  </g>

  <!-- 2. Breathing core glow -->
  <circle class="m-core" cx="100" cy="100" r="34" fill="url(#m-gold-radial)" style="mix-blend-mode:plus-lighter"/>

  <!-- 3. Rotating radar sweep with a fading trail -->
  <g class="m-sweep">
    <path d="M 100 100 L 100 30 A 70 70 0 0 1 149 50 Z" fill="url(#m-sweep-fade)" opacity="0.18"/>
    <line x1="100" y1="100" x2="100" y2="30" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- 4. The geometric G: outer arc -->
  <path d="M 145 125 A 52 52 0 1 1 145 75"
        fill="none" stroke="#ffe6cb" stroke-width="12" stroke-linecap="round" opacity="0.92"/>
  <!-- inward connector bar -->
  <path d="M 145 100 H 115"
        fill="none" stroke="#34d399" stroke-width="12" stroke-linecap="round"/>

  <!-- 5. Data shimmer running along the full G path -->
  <path class="m-shimmer"
        d="M 145 125 A 52 52 0 1 1 145 75 M 145 100 H 115"
        fill="none" stroke="url(#m-glow-highlight)" stroke-width="13" stroke-linecap="round"
        style="mix-blend-mode:plus-lighter"/>

  <!-- 6. Coordinate crosshair ticks -->
  <g class="m-tick" stroke="#ffe6cb" stroke-width="1" opacity="0.3">
    <line x1="100" y1="18" x2="100" y2="25"/>
    <line x1="100" y1="175" x2="100" y2="182"/>
    <line x1="18" y1="100" x2="25" y2="100"/>
    <line x1="175" y1="100" x2="182" y2="100"/>
  </g>
</svg>
