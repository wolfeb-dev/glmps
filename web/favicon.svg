<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="32" height="32" role="img" aria-labelledby="glmps-favicon-title">
  <title id="glmps-favicon-title">GLMPS — geometric G inside a radar lens</title>

  <defs>
    <!-- Compact core glow, gold to transparent -->
    <radialGradient id="f-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffbd38" stop-opacity="0.85"/>
      <stop offset="55%"  stop-color="#34d399" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#041c1c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark backing disc so the mark holds contrast on light browser tab chrome -->
  <circle cx="100" cy="100" r="94" fill="#041c1c"/>

  <!-- Lens ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#ffe6cb" stroke-width="4" opacity="0.28"/>

  <!-- Hint of core glow -->
  <circle cx="100" cy="100" r="40" fill="url(#f-glow)"/>

  <!-- Geometric G: thick, full-contrast for small sizes -->
  <path d="M 146 126 A 50 50 0 1 1 146 74"
        fill="none" stroke="#ffe6cb" stroke-width="18" stroke-linecap="round"/>
  <path d="M 146 100 H 112"
        fill="none" stroke="#34d399" stroke-width="18" stroke-linecap="round"/>
</svg>
